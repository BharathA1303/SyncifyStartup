<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syncify — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:#7f5af0; --green:#2cb67d; --pink:#e53170;
      --grad:linear-gradient(135deg,#7f5af0,#2cb67d);
      --bg:#080810; --surface:#0d0d1b; --raised:#13131f;
      --t1:#f0eeff; --t2:#8892a4; --t3:#4a5568;
      --b1:rgba(255,255,255,0.06); --b2:rgba(255,255,255,0.11);
      --r-md:13px; --r-lg:20px; --r-full:9999px;
      --display:'Syne',sans-serif; --body:'DM Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--body);color:var(--t1);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{font-family:var(--body);cursor:pointer;border:none;outline:none}

    /* Nav */
    .nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:64px;display:flex;align-items:center;
      background:rgba(8,8,16,0.85);backdrop-filter:blur(24px);
      border-bottom:1px solid var(--b1);padding:0 24px;
      justify-content:space-between;
    }
    .nav-logo{font-family:var(--display);font-size:1.3rem;font-weight:800;letter-spacing:-.04em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-right{display:flex;align-items:center;gap:12px}
    .nav-user{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--t2)}
    .nav-av{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;overflow:hidden}
    .nav-av img{width:100%;height:100%;object-fit:cover}
    .btn-logout{background:transparent;border:1px solid var(--b1);border-radius:var(--r-full);padding:6px 16px;font-size:.78rem;color:var(--t2);transition:all .2s}
    .btn-logout:hover{border-color:var(--b2);color:var(--t1)}

    /* Main */
    .main{padding-top:64px;min-height:100vh}
    .content{max-width:900px;margin:0 auto;padding:40px 24px}

    /* Welcome */
    .welcome{margin-bottom:32px}
    .welcome-greeting{font-size:.78rem;font-weight:700;color:var(--green);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
    .welcome-title{font-family:var(--display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-.04em;line-height:1.1}
    .welcome-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
    .stat-card{
      background:var(--surface);border:1px solid var(--b1);border-radius:var(--r-lg);
      padding:20px;transition:all .25s;
    }
    .stat-card:hover{border-color:var(--b2);transform:translateY(-3px)}
    .stat-label{font-size:.72rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    .stat-value{font-family:var(--display);font-size:1.8rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .stat-sub{font-size:.72rem;color:var(--t3);margin-top:4px}

    /* Quick actions */
    .section-title{font-family:var(--display);font-size:1.1rem;font-weight:700;margin-bottom:16px;letter-spacing:-.02em}
    .actions{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:32px}
    .action-btn{
      background:var(--surface);border:1px solid var(--b1);border-radius:var(--r-lg);
      padding:20px;display:flex;align-items:center;gap:14px;
      cursor:pointer;transition:all .25s;text-align:left;color:var(--t1);
    }
    .action-btn:hover{border-color:rgba(127,90,240,.35);box-shadow:0 8px 30px rgba(127,90,240,.1);transform:translateY(-2px)}
    .action-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .action-name{font-weight:700;font-size:.9rem;margin-bottom:2px}
    .action-desc{font-size:.75rem;color:var(--t2)}

    /* Auth status */
    .auth-card{
      background:rgba(44,182,125,.06);border:1px solid rgba(44,182,125,.2);
      border-radius:var(--r-lg);padding:20px;margin-bottom:32px;
      display:flex;align-items:center;gap:14px;
    }
    .auth-ico{font-size:22px}
    .auth-label{font-size:.78rem;font-weight:700;color:#3de8a0;margin-bottom:2px}
    .auth-detail{font-size:.75rem;color:var(--t2)}

    /* Loading */
    .loading{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:16px}
    .spinner{width:32px;height:32px;border:3px solid var(--b1);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">Syncify</a>
  <div class="nav-right">
    <div class="nav-user">
      <div class="nav-av" id="navAv">?</div>
      <span id="navName">Loading...</span>
    </div>
    <button class="btn-logout" id="btnLogout">Log out</button>
  </div>
</nav>

<div class="main">
  <!-- Loading state -->
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <span style="color:var(--t3);font-size:.85rem">Loading your dashboard...</span>
  </div>

  <!-- Dashboard content (hidden until auth confirmed) -->
  <div class="content" id="dashContent" style="display:none">

    <div class="welcome">
      <div class="welcome-greeting">🎵 Welcome back</div>
      <h1 class="welcome-title">Hey, <span id="userName">friend</span>!</h1>
    </div>

    <!-- Auth confirmation -->
    <div class="auth-card">
      <div class="auth-ico">✅</div>
      <div>
        <div class="auth-label">Authentication working</div>
        <div class="auth-detail" id="authDetail">Logged in via Firebase + JWT</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Snap Points</div>
        <div class="stat-value" id="snapPoints">0</div>
        <div class="stat-sub">New Vibes level</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Bond Level</div>
        <div class="stat-value">🎵</div>
        <div class="stat-sub" id="bondLevel">New Vibes</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Day 6 of 49</div>
        <div class="stat-value">12%</div>
        <div class="stat-sub">Build progress</div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="section-title">Quick Actions</div>
    <div class="actions">
      <button class="action-btn" onclick="alert('Coming Day 10 — Sync Sessions!')">
        <div class="action-ico" style="background:rgba(127,90,240,.15)">🔄</div>
        <div>
          <div class="action-name">Start Sync Session</div>
          <div class="action-desc">Listen in real-time with a friend</div>
        </div>
      </button>
      <button class="action-btn" onclick="alert('Coming Day 12 — Friends System!')">
        <div class="action-ico" style="background:rgba(44,182,125,.15)">👥</div>
        <div>
          <div class="action-name">Add Friends</div>
          <div class="action-desc">Find people to sync with</div>
        </div>
      </button>
      <button class="action-btn" onclick="alert('Coming Day 15 — Mood Rooms!')">
        <div class="action-ico" style="background:rgba(229,49,112,.15)">🎭</div>
        <div>
          <div class="action-name">Join Mood Room</div>
          <div class="action-desc">Party Mode · 891 listening now</div>
        </div>
      </button>
      <button class="action-btn" onclick="alert('Coming Day 20 — AI Features!')">
        <div class="action-ico" style="background:rgba(255,215,0,.15)">🤖</div>
        <div>
          <div class="action-name">AI Bond Score</div>
          <div class="action-desc">Check your Soul Sync compatibility</div>
        </div>
      </button>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCHVFod0I0_-fo0O0rShSJLQpe4nyNHwQk",
    authDomain: "syncify-001.firebaseapp.com",
    projectId: "syncify-001",
    storageBucket: "syncify-001.firebasestorage.app",
    messagingSenderId: "196699119630",
    appId: "1:196699119630:web:9544ad0e5ede3db1389c5f"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const $    = id => document.getElementById(id);

  // ── Check auth state ──────────────────────────
  onAuthStateChanged(auth, async user => {
    if (!user) {
      // Not logged in — redirect
      window.location.href = '/login';
      return;
    }

    // Show dashboard
    $('loadingState').style.display = 'none';
    $('dashContent').style.display  = 'block';

    // Populate nav
    const initials = (user.displayName || user.email || '?')
      .split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2);
    $('navAv').textContent = initials;
    $('navName').textContent = user.displayName || user.email;

    // Populate dashboard
    const firstName = (user.displayName || 'friend').split(' ')[0];
    $('userName').textContent = firstName;

    // Try to get user data from backend
    const jwt = localStorage.getItem('syncify_jwt');
    if (jwt) {
      try {
        const res = await fetch('/api/auth/me', {
          headers: { Authorization: `Bearer ${jwt}` }
        });
        if (res.ok) {
          const data = await res.json();
          const u = data.data;
          $('snapPoints').textContent = u.snap_points || 0;
          $('bondLevel').textContent  = u.bond_level?.name || 'New Vibes';
          $('authDetail').textContent = `@${u.username} · JWT + Firebase verified ✓`;
        }
      } catch { /* backend might be restarting */ }
    }

    if (user.photoURL) {
      $('navAv').innerHTML = `<img src="${user.photoURL}" alt="avatar">`;
    }
  });

  // ── Logout ────────────────────────────────────
  $('btnLogout').addEventListener('click', async () => {
    await signOut(auth);
    localStorage.removeItem('syncify_jwt');
    localStorage.removeItem('syncify_user');
    window.location.href = '/login';
  });
</script>
</body>
</html>
